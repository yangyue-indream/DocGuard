<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 1000px;
    background: linear-gradient(165deg, #f0f4ff 0%, #e8eeff 30%, #ffffff 60%, #f5f7ff 100%);
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Decorative geometric elements */
  .circle-large {
    position: absolute; top: -120px; right: -80px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, rgba(37,99,235,0.01) 70%);
  }
  .circle-mid {
    position: absolute; bottom: 180px; left: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
  }
  .dot-grid {
    position: absolute; top: 60px; right: 40px;
    display: grid; grid-template-columns: repeat(6, 16px);
    gap: 12px; opacity: 0.15;
  }
  .dot-grid span {
    width: 4px; height: 4px; border-radius: 50%; background: #2563eb;
    display: block;
  }

  /* Blue accent bar */
  .accent-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #1e40af 0%, #2563eb 40%, #3b82f6 70%, #60a5fa 100%);
  }

  /* Main content container */
  .content {
    position: relative; z-index: 10;
    padding: 80px 60px 60px;
    display: flex; flex-direction: column; height: 100%;
  }

  /* Top section */
  .top-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(37,99,235,0.08);
    border: 1px solid rgba(37,99,235,0.15);
    border-radius: 40px; padding: 8px 20px;
    font-size: 14px; font-weight: 500; color: #2563eb;
    letter-spacing: 1px; width: fit-content;
    margin-bottom: 36px;
  }
  .top-tag .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3b82f6; display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  /* Hero typography */
  .hero-number {
    font-size: 160px; font-weight: 900; line-height: 1;
    color: #1e3a5f;
    letter-spacing: -6px;
    margin-bottom: 8px;
    background: linear-gradient(180deg, #1e3a5f 0%, #2563eb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-unit {
    font-size: 52px; font-weight: 700; color: #1e3a5f;
    letter-spacing: 2px; margin-left: 6px;
    position: relative; top: -24px;
  }
  .hero-sub {
    font-size: 36px; font-weight: 700; color: #2563eb;
    letter-spacing: 4px; margin-top: -12px;
  }
  .hero-desc {
    font-size: 16px; font-weight: 300; color: #64748b;
    margin-top: 12px; letter-spacing: 2px;
    max-width: 400px; line-height: 1.6;
  }

  /* Feature cards row */
  .features {
    display: flex; gap: 16px; margin-top: auto; margin-bottom: 40px;
  }
  .feat-card {
    flex: 1; background: white;
    border-radius: 16px; padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
    text-align: center;
    transition: transform 0.2s;
  }
  .feat-emoji { font-size: 32px; margin-bottom: 8px; }
  .feat-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .feat-desc { font-size: 12px; color: #94a3b8; }

  /* CTA */
  .cta {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: white; text-align: center;
    padding: 18px; border-radius: 14px;
    font-size: 20px; font-weight: 700; letter-spacing: 3px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.25);
  }
  .cta-sub {
    text-align: center; font-size: 13px; color: #94a3b8;
    margin-top: 12px; letter-spacing: 1px;
  }

  /* Bottom corner brand */
  .brand {
    position: absolute; bottom: 24px; right: 40px;
    font-size: 11px; color: #cbd5e1; letter-spacing: 1px;
  }

  /* Subtle grid lines */
  .grid-line-h {
    position: absolute; left: 0; right: 0; height: 1px;
    background: rgba(37,99,235,0.04);
  }
</style>
</head>
<body>

<div class="accent-bar"></div>
<div class="circle-large"></div>
<div class="circle-mid"></div>
<div class="dot-grid">
  <span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span>
</div>
<div class="grid-line-h" style="top:33.33%"></div>
<div class="grid-line-h" style="top:66.66%"></div>

<div class="content">
  <div class="top-tag">
    <span class="dot"></span> AI 驱动 · 效率革命
  </div>

  <div>
    <span class="hero-number">30</span><span class="hero-unit">秒</span>
    <div class="hero-sub">生成周报</div>
    <div class="hero-desc">
      输入本周关键词，AI 自动撰写专业周报。<br/>
      不再加班憋字，效率提升 10 倍 ✨
    </div>
  </div>

  <div class="features">
    <div class="feat-card">
      <div class="feat-emoji">📝</div>
      <div class="feat-title">输入关键词</div>
      <div class="feat-desc">口语化随便写</div>
    </div>
    <div class="feat-card">
      <div class="feat-emoji">🤖</div>
      <div class="feat-title">AI 自动生成</div>
      <div class="feat-desc">专业周报秒出</div>
    </div>
    <div class="feat-card">
      <div class="feat-emoji">📤</div>
      <div class="feat-title">一键复制发送</div>
      <div class="feat-desc">直接粘贴到OA</div>
    </div>
  </div>

  <div class="cta">
    免费试用 · 随时可用
  </div>
  <div class="cta-sub">基于 DeepSeek · 数据不上传 · 安全可靠</div>
</div>

<div class="brand">AI 周报生成器</div>

</body>
</html>
